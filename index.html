<!DOCTYPE html>
<html>
<head>
<title>Daily Task Reminder</title>
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#f0f4f8;
display:flex;
gap:50px;
padding:50px;
}

/* LEFT PANEL */

.allTasks{
width:280px;
background:#ede9fe;
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
height:fit-content;
}

.allTasks h2{
margin-top:0;
}

.allTasks li{
margin-bottom:8px;
}

/* MAIN APP */

.container{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:380px;
text-align:center;
}

input{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 15px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

ul{
list-style:none;
padding:0;
}

/* TASK CARDS */

.taskCard{
background:#f9fafb;
padding:14px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
text-align:left;
}

.taskTop{
display:flex;
justify-content:space-between;
align-items:center;
}

/* PROGRESS BAR */

.progressBar{
width:100%;
height:8px;
background:#e5e7eb;
border-radius:6px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:8px;
background:#4f46e5;
width:0%;
}

/* UPCOMING TASK */

.upcoming{
border:2px solid #f59e0b;
}

/* GLOW */

.glow{
box-shadow:0 0 20px #f59e0b;
}

.countdown{
font-weight:bold;
color:#4f46e5;
font-size:13px;
}

.delete{
background:#ef4444;
padding:5px 8px;
font-size:12px;
}

</style>
</head>

<body>

<div class="allTasks">
<h2>All Tasks</h2>
<ul id="allTasksList"></ul>
</div>

<div class="container">

<h1>Daily Task Reminder</h1>

<input id="taskInput" placeholder="Task">
<input type="time" id="timeInput">

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

if (Notification.permission !== "granted") {
Notification.requestPermission();
}

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

render();
renderAllTasks();

function addTask(){

let name=document.getElementById("taskInput").value
let time=document.getElementById("timeInput").value

if(name==="") return

tasks.push({name,time})

save()
render()
renderAllTasks()

document.getElementById("taskInput").value=""
}

function render(){

let list=document.getElementById("taskList")
list.innerHTML=""

let now=new Date()

let nextIndex=-1
let min=9999

tasks.forEach((task,i)=>{

let [h,m]=task.time.split(":").map(Number)

let diff=(h*60+m)-(now.getHours()*60+now.getMinutes())
if(diff<0) diff+=1440

if(diff<min){
min=diff
nextIndex=i
}

})

tasks.forEach((task,i)=>{

let card=document.createElement("div")
card.className="taskCard"

if(i===nextIndex) card.classList.add("upcoming")

let top=document.createElement("div")
top.className="taskTop"

let title=document.createElement("span")
title.innerText=task.name+" ("+task.time+")"

let del=document.createElement("button")
del.innerText="🗑"
del.className="delete"

del.onclick=()=>{
tasks.splice(i,1)
save()
render()
renderAllTasks()
}

top.appendChild(title)
top.appendChild(del)

let countdown=document.createElement("div")
countdown.className="countdown"

let progressBar=document.createElement("div")
progressBar.className="progressBar"

let progress=document.createElement("div")
progress.className="progress"

progressBar.appendChild(progress)

card.appendChild(top)
card.appendChild(countdown)
card.appendChild(progressBar)

list.appendChild(card)

})

}

function renderAllTasks(){

let list=document.getElementById("allTasksList")
list.innerHTML=""

tasks.forEach(task=>{
let li=document.createElement("li")
li.innerText=task.name+" ("+task.time+")"
list.appendChild(li)
})

}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function update(){

let now=new Date()

document.querySelectorAll(".taskCard").forEach((card,i)=>{

let task=tasks[i]

let [h,m]=task.time.split(":").map(Number)

let diff=(h*60+m)-(now.getHours()*60+now.getMinutes())
if(diff<0) diff+=1440

let hours=Math.floor(diff/60)
let mins=diff%60

card.querySelector(".countdown").innerText=
hours+"h "+mins+"m left"

let progress=(1-(diff/1440))*100
card.querySelector(".progress").style.width=progress+"%"

if(diff<=10) card.classList.add("glow")

if(now.getHours()==h && now.getMinutes()==m){
new Notification("Reminder: "+task.name)
}

})

}

setInterval(update,1000)

</script>

</body>
</html>
