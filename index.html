<!DOCTYPE html>
<html>
<head>
<title>Daily Task Reminder</title>

<style>

body{
font-family:Arial;
background:#f0f4f8;
display:flex;
gap:40px;
padding:40px;
transition:0.3s;
}

/* DARK MODE */

.dark{
background:#1f2937;
color:white;
}

.dark .container{
background:#374151;
}

.dark .taskCard{
background:#4b5563;
}

.dark .allTasks{
background:#4338ca;
}

/* PANELS */

.container{
background:white;
padding:25px;
border-radius:15px;
width:380px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.allTasks{
background:#ede9fe;
padding:20px;
border-radius:14px;
width:250px;
}

.calendar{
background:#fff;
padding:20px;
border-radius:14px;
width:250px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* TASK CARD */

.taskCard{
background:#f9fafb;
padding:14px;
border-radius:10px;
margin-bottom:10px;
}

.category{
font-size:12px;
font-weight:bold;
}

.school{color:#2563eb}
.work{color:#16a34a}
.personal{color:#db2777}
.health{color:#ea580c}

.countdown{
font-size:13px;
color:#4f46e5;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#4f46e5;
color:white;
cursor:pointer;
}

.delete{
background:#ef4444;
}

</style>
</head>

<body>

<div class="allTasks">
<h3>All Tasks</h3>
<ul id="allTasks"></ul>
</div>

<div class="container">

<h2>Task Reminder</h2>

<input id="taskInput" placeholder="Task">

<input type="time" id="timeInput">

<select id="category">

<option>School</option>
<option>Work</option>
<option>Personal</option>
<option>Health</option>

</select>

<button onclick="addTask()">Add</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div id="taskList"></div>

</div>

<div class="calendar">
<h3>Today's Tasks</h3>
<ul id="calendarTasks"></ul>
</div>

<script>

if(Notification.permission!=="granted"){
Notification.requestPermission()
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[]

render()

function addTask(){

let name=document.getElementById("taskInput").value
let time=document.getElementById("timeInput").value
let category=document.getElementById("category").value

if(name==="")return

tasks.push({
name,
time,
category,
notified:false
})

save()
render()

document.getElementById("taskInput").value=""

}

function render(){

let list=document.getElementById("taskList")
let all=document.getElementById("allTasks")
let cal=document.getElementById("calendarTasks")

list.innerHTML=""
all.innerHTML=""
cal.innerHTML=""

tasks.forEach((task,i)=>{

let card=document.createElement("div")
card.className="taskCard"

card.innerHTML = `
<b>${task.name}</b> (${task.time})
<div class="category ${task.category.toLowerCase()}">${task.category}</div>
<div class="countdown" id="cd${i}"></div>

<button onclick="shareTask('${task.name}','${task.time}')">Share</button>

<button class="delete" onclick="removeTask(${i})">Delete</button>
`

list.appendChild(card)

let li=document.createElement("li")
li.innerText=task.name+" ("+task.time+")"
all.appendChild(li)

let li2=document.createElement("li")
li2.innerText=task.time+" - "+task.name
cal.appendChild(li2)

})

}

function removeTask(i){

tasks.splice(i,1)

save()
render()

}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function update(){

let now=new Date()

tasks.forEach((task,i)=>{

let [h,m]=task.time.split(":").map(Number)

let diff=(h*60+m)-(now.getHours()*60+now.getMinutes())

if(diff<0) diff+=1440

let hours=Math.floor(diff/60)
let mins=diff%60

let cd=document.getElementById("cd"+i)

if(cd){
cd.innerText=hours+"h "+mins+"m left"
}

if(now.getHours()==h && now.getMinutes()==m && !task.notified){

new Notification("Reminder: "+task.name)

task.notified=true

save()

}

})

}

setInterval(update,1000)

/* DARK MODE */

function toggleDark(){
document.body.classList.toggle("dark")
}
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
}

function shareTask(name,time){

const text = `Reminder: ${name} at ${time}`

if(navigator.share){

navigator.share({
title:"Task Reminder",
text:text
})

}else{

navigator.clipboard.writeText(text)
alert("Task copied! Send it to a friend.")

}

}
  
</script>

</body>
</html>
