<!DOCTYPE html>
<html>
<head>
<title>Daily Task Reminder</title>
<style>
/* BODY & LAYOUT */
body{
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  display: flex;
  gap: 40px;
  padding: 40px;
  transition: 0.3s;
}

/* DARK MODE */
.dark{
  background: #1f2937;
  color: white;
}
.dark .container{
  background: #374151;
}
.dark .taskCard{
  background: #4b5563;
}
.dark .allTasks{
  background: #4338ca;
}

/* CONTAINERS */
.container{
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 380px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.allTasks{
  background: #ede9fe;
  padding: 20px;
  border-radius: 14px;
  width: 250px;
  height: fit-content;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.calendar{
  background: #fff;
  padding: 20px;
  border-radius: 14px;
  width: 250px;
  height: fit-content;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* TASK CARDS */
.taskCard{
  background: #f9fafb;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.category{
  font-size: 12px;
  font-weight: bold;
}

.school{color:#2563eb}
.work{color:#16a34a}
.personal{color:#db2777}
.health{color:#ea580c}

.countdown{
  font-size: 13px;
  color: #4f46e5;
  margin-top: 5px;
}

button{
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
  margin-right: 5px;
}
.delete{
  background: #ef4444;
}
</style>
</head>
<body>

<!-- Calendar Box -->
<div class="calendar">
  <h3>Today's Tasks</h3>
  <ul id="todayTasks"></ul>
  <h3>Future Tasks</h3>
  <ul id="futureTasks"></ul>
</div>

<!-- Main Task Input -->
<div class="container">
  <h2>Task Reminder</h2>
  <input id="taskInput" placeholder="Task">
  <input type="date" id="dateInput">
  <input type="time" id="timeInput">
  <select id="category">
    <option>School</option>
    <option>Work</option>
    <option>Personal</option>
    <option>Health</option>
  </select>
  <button onclick="addTask()">Add</button>
  <button onclick="toggleDark()">🌙 Dark Mode</button>

  <div id="taskList"></div>
</div>

<!-- All Tasks -->
<div class="allTasks">
  <h3>All Tasks</h3>
  <ul id="allTasksList"></ul>
</div>

<script>
// Notification permission
if(Notification.permission !== "granted"){
  Notification.requestPermission();
}

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// Add new task
function addTask(){
  let name = document.getElementById("taskInput").value;
  let date = document.getElementById("dateInput").value;
  let time = document.getElementById("timeInput").value;
  let category = document.getElementById("category").value;

  if(name === "" || date === "" || time === "") return;

  tasks.push({name, date, time, category, notified: false});
  save();
  render();

  document.getElementById("taskInput").value = "";
  document.getElementById("dateInput").value = "";
  document.getElementById("timeInput").value = "";
}

// Remove task
function removeTask(i){
  tasks.splice(i,1);
  save();
  render();
}

// Save tasks to localStorage
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// Share task
function shareTask(name, time){
  const text = `Reminder: ${name} at ${time}`;
  if(navigator.share){
    navigator.share({title:"Task Reminder", text});
  } else {
    navigator.clipboard.writeText(text);
    alert("Task copied! Send it to a friend.");
  }
}

// Render all sections
function render(){
  let list = document.getElementById("taskList");
  let todayList = document.getElementById("todayTasks");
  let futureList = document.getElementById("futureTasks");
  let allList = document.getElementById("allTasksList");

  list.innerHTML = "";
  todayList.innerHTML = "";
  futureList.innerHTML = "";
  allList.innerHTML = "";

  let today = new Date().toISOString().split("T")[0];

  tasks.forEach((task,i)=>{
    // Main Task Card
    let card = document.createElement("div");
    card.className = "taskCard";
    card.innerHTML = `
      <b>${task.name}</b> (${task.time})
      <div class="category ${task.category.toLowerCase()}">${task.category}</div>
      <div class="countdown" id="cd${i}"></div>
      <button onclick="shareTask('${task.name}','${task.time}')">Share</button>
      <button class="delete" onclick="removeTask(${i})">Delete</button>
    `;
    list.appendChild(card);

    // All Tasks
    let liAll = document.createElement("li");
    liAll.innerText = task.name + " (" + task.time + ")";
    allList.appendChild(liAll);

    // Today's / Future Tasks
    let liDate = document.createElement("li");
    liDate.innerText = task.time + " - " + task.name;
    if(task.date === today){
      todayList.appendChild(liDate);
    } else {
      futureList.appendChild(liDate);
    }
  });
}

// Update countdowns and notifications
function update(){
  let now = new Date();
  let today = now.toISOString().split("T")[0];

  tasks.forEach((task,i)=>{
    // Countdown
    let [h,m] = task.time.split(":").map(Number);
    let taskTime = new Date(task.date + "T" + task.time);
    let diff = taskTime - now;

    let cd = document.getElementById("cd"+i);
    if(cd){
      if(diff > 0){
        let hours = Math.floor(diff/1000/3600);
        let mins = Math.floor((diff/1000/60) % 60);
        cd.innerText = `${hours}h ${mins}m left`;
      } else {
        cd.innerText = `Due!`;
      }
    }

    // Notifications once
    if(!task.notified && diff <= 0){
      new Notification("Reminder: "+task.name);
      task.notified = true;
      save();
    }
  });
}

setInterval(update,1000);

// Dark mode
function toggleDark(){
  document.body.classList.toggle("dark");
}

// Service worker (for installable PWA)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// Initial render
render();
</script>
</body>
</html>
