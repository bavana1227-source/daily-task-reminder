<!DOCTYPE html>
<html>
<head> 
<title>Daily Task Reminder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background: #f0f4f8;
  display: flex;
  gap: 40px;
  padding: 40px;
}
@media (max-width: 768px) {
  body { flex-direction: column; padding: 15px; }
}

/* DARK MODE */
.dark { background: #071163ff; color: Black; }
.dark .container { background: #490051ff; }
.dark .taskCard { background: #0d6922ff; }

/* PANELS */
.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 380px;
}
.calendar, .allTasks {
  background: #e9ccecff;
  padding: 20px;
  border-radius: 14px;
  width: 250px;
}

/* TASK */
.taskCard {
  background:  #9cc898ff;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}
.category { font-size: 12px; font-weight: bold; }

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}
.delete { background: red; }
.edit { background: orange; }

input, select { width: 90%; margin: 5px 0; padding: 8px; }
</style>
</head>
<body>

<div class="calendar">
  <h3>Today's Tasks</h3>
  <ul id="todayTasks"></ul>
  <h3>Future Tasks</h3>
  <ul id="futureTasks"></ul>
</div>

<div class="container">
  <h2>Task Reminder</h2>

  <input id="taskInput" placeholder="Task">
  <input type="date" id="dateInput">
  <input type="time" id="timeInput">

  <select id="category">
    <option>School</option>
    <option>Work</option>
    <option>Personal</option>
    <option>Health</option>
  </select>

  <label>Repeat:</label>
  <select id="repeatType">
    <option value="none">No Repeat</option>
    <option value="daily">Daily</option>
    <option value="weekly">Specific Days</option>
  </select>

  <div id="daySelector" style="display:none;">
    <label><input type="checkbox" value="1"> Mon</label>
    <label><input type="checkbox" value="2"> Tue</label>
    <label><input type="checkbox" value="3"> Wed</label>
    <label><input type="checkbox" value="4"> Thu</label>
    <label><input type="checkbox" value="5"> Fri</label>
    <label><input type="checkbox" value="6"> Sat</label>
    <label><input type="checkbox" value="0"> Sun</label>
  </div>

  <br>
  <button onclick="addOrUpdateTask()" id="mainBtn">Add</button>
  <button onclick="toggleDark()">🌙 Dark</button>

 
</div>

<div class="allTasks">
  <h3>All Tasks</h3>
  <ul id="allTasksList"></ul>
</div>

<script>
document.getElementById("repeatType").addEventListener("change", function() {
  document.getElementById("daySelector").style.display =
    this.value === "weekly" ? "block" : "none";
});

if(Notification.permission !== "granted") Notification.requestPermission();

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = null;

// ADD OR UPDATE
function addOrUpdateTask(){
  let name = taskInput.value;
  let date = dateInput.value;
  let time = timeInput.value;
let category = document.getElementById("category").value;
let repeatType = document.getElementById("repeatType").value;

  let repeatDays = [];
  if(repeatType === "weekly"){
    document.querySelectorAll("#daySelector input:checked").forEach(cb=>{
      repeatDays.push(Number(cb.value));
    });
  }

  if(!name || !date || !time){
    alert("Fill everything");
    return;
  }

  let taskObj = {name, date, time, category, repeatType, repeatDays, notified:false};

  if(editIndex === null){
    tasks.push(taskObj);
  } else {
    tasks[editIndex] = taskObj;
    editIndex = null;
    mainBtn.innerText = "Add";
  }

  save(); render(); clearForm();
}

// EDIT
function editTask(i){
  let t = tasks[i];

  taskInput.value = t.name;
  dateInput.value = t.date;
  timeInput.value = t.time;
  category.value = t.category;
  repeatType.value = t.repeatType;

  document.getElementById("daySelector").style.display =
    t.repeatType === "weekly" ? "block" : "none";

  document.querySelectorAll("#daySelector input").forEach(cb=>{
    cb.checked = t.repeatDays.includes(Number(cb.value));
  });

  editIndex = i;
  mainBtn.innerText = "Update";
}

// REMOVE
function removeTask(i){
  tasks.splice(i,1);
  save(); render();
}

// SAVE
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// CLEAR FORM
function clearForm(){
  taskInput.value = "";
  dateInput.value = "";
  timeInput.value = "";
  document.querySelectorAll("#daySelector input").forEach(cb=>cb.checked=false);
}

// RENDER
function render(){
  taskList.innerHTML = "";
  todayTasks.innerHTML = "";
  futureTasks.innerHTML = "";
  allTasksList.innerHTML = "";

  let today = new Date().toISOString().split("T")[0];

  tasks.forEach((t,i)=>{
    let card = document.createElement("div");
    card.className = "taskCard";
    card.innerHTML = `
      <b>${t.name}</b> (${t.time})
      <div class="category">
        ${t.category} ${t.repeatType !== "none" ? "• 🔁 " + t.repeatType : ""}
      </div>
      <button class="edit" onclick="editTask(${i})">Edit</button>
      <button class="delete" onclick="removeTask(${i})">Delete</button>
    `;
 

    let li = document.createElement("li");
    li.innerText = t.time + " - " + t.name;

    if(t.date === today) todayTasks.appendChild(li);
    else futureTasks.appendChild(li);

   let liAll = document.createElement("li");
liAll.appendChild(card);
allTasksList.appendChild(liAll);
  });
}

// UPDATE (notifications)
function update(){
  let now = new Date();
  let today = now.toISOString().split("T")[0];
  let todayDay = now.getDay();

  tasks.forEach(task=>{
    let [h,m] = task.time.split(":").map(Number);

    let shouldRun = false;

    if(task.repeatType === "daily") shouldRun = true;
    else if(task.repeatType === "weekly") shouldRun = task.repeatDays.includes(todayDay);
    else shouldRun = task.date === today;

    if(shouldRun && now.getHours() === h && now.getMinutes() === m && !task.notified){
      new Notification("Reminder: " + task.name);
      task.notified = true;
      save();
    }

    if(task.repeatType !== "none" && now.getHours() === 0 && now.getMinutes() === 0){
      task.notified = false;
    }
  });
}

setInterval(update, 60000);

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
