<!DOCTYPE html>
<html>
<head>
<title>Daily Task Reminder</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#eef2f7;
}

input{
padding:10px;
width:220px;
}

button{
padding:10px;
margin:5px;
}

li{
list-style:none;
margin:10px;
}
</style>

</head>

<body>

<h1>Daily Task Reminder</h1>

<input id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

<script>

if (Notification.permission !== "granted") {
Notification.requestPermission();
}

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

render()

function addTask(){

let input=document.getElementById("taskInput")
let task=input.value

if(task==="") return

tasks.push(task)

saveTasks()

render()

input.value=""
}

function render(){

let list=document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

let li=document.createElement("li")
li.innerText=task

let del=document.createElement("button")
del.innerText="Delete"

del.onclick=function(){
tasks.splice(index,1)
saveTasks()
render()
}

li.appendChild(del)

list.appendChild(li)

})

}

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function sendReminder(){

tasks.forEach(task=>{
new Notification("Reminder: "+task)
})

}

setInterval(sendReminder,86400000)

</script>

</body>
</html>
