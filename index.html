<!DOCTYPE html>
<html>
<head> 
<title>Daily Task Reminder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Lobster Font -->
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<style>
body {
  font-family: Arial;
  background: #cfe6fdff;
  display: flex;
  flex-wrap: wrap;           /* allow wrapping on small screens */
  justify-content: center;    /* center horizontally */
  align-items: flex-start;    /* top-align vertically */
  gap: 40px;
  padding: 40px;
  min-height: 100vh;          /* ensure full height */ 
  box-sizing: border-box;
}
}
@media (max-width: 768px) {
  body { flex-direction: column; padding: 15px; }
}

/* DARK MODE */
.dark { background: #071163ff; color: black; }
.dark .container { background: #490051ff; }
.dark .taskCard { background: #0d6922ff; }

/* PANELS */
.container {
  background: white;
  padding: 25px;
  border-radius: 0px;
  width: 380px;
}
.calendar, .allTasks {
  background: #e9ccecff;
  padding: 20px;
}

.category { font-size: 12px; font-weight: bold; }

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}
.delete { background: red; }
.edit { background: orange; }

input, select { width: 90%; margin: 5px 0; padding: 8px; }

.task-title { font-family: 'Lobster', cursive; font-size: 1.2em; }

/* Glow effect 15–5 minutes before due */
.glow {
  animation: glowRed 1s infinite alternate;
  font-weight: bold;
}

@keyframes glowGreen {
  from { text-shadow: 0 0 5px #acd6aeff; color: #acd6aeff; }
  to   { text-shadow: 0 0 20px #acd6aeff; color: #acd6aeff; }
}

/* Flash effect for last 5 minutes */
.flash {
  animation: flashRed 0.5s infinite alternate;
  font-weight: bold;
}

@keyframes flashRed {
  from { text-shadow: 0 0 20px #ff0000; color: #ff0000; }
  to   { text-shadow: 0 0 40px #ff0000; color: #ff0000; }
}
</style>
</head>
<body>

<div class="calendar">
  <h3>Today's Tasks</h3>
  <ul id="todayTasks"></ul>
  <h3>Future Tasks</h3>
  <ul id="futureTasks"></ul>
</div>

<div class="container">
  <h2 style="font-family:'Lobster', cursive;">Task Reminder</h2>

  <input id="taskInput" placeholder="Task">
  <input type="date" id="dateInput">
  <input type="time" id="timeInput">

  <select id="category">
    <option>School</option>
    <option>Work</option>
    <option>Personal</option>
    <option>Health</option>
  </select>

  <label>Repeat:</label>
  <select id="repeatType">
    <option value="none">No Repeat</option>
    <option value="daily">Daily</option>
    <option value="weekly">Specific Days</option>
  </select>

  <div id="daySelector" style="display:none;">
    <label><input type="checkbox" value="1"> Mon</label>
    <label><input type="checkbox" value="2"> Tue</label>
    <label><input type="checkbox" value="3"> Wed</label>
    <label><input type="checkbox" value="4"> Thu</label>
    <label><input type="checkbox" value="5"> Fri</label>
    <label><input type="checkbox" value="6"> Sat</label>
    <label><input type="checkbox" value="0"> Sun</label>
  </div>

  <br>
  <button onclick="addOrUpdateTask()" id="mainBtn">Add</button>
  <button onclick="toggleDark()">🌙 Dark</button>
</div>

<div class="allTasks">
  <h3>All Tasks</h3>
  <ul id="allTasksList"></ul>
</div>

<script>
document.getElementById("repeatType").addEventListener("change", function() {
  document.getElementById("daySelector").style.display =
    this.value === "weekly" ? "block" : "none";

  document.getElementById("dateInput").style.display = 
    (this.value === "daily" || this.value === "weekly") ? "none" : "block";
});

if(Notification.permission !== "granted") Notification.requestPermission();

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = null;

// ADD OR UPDATE
function addOrUpdateTask(){
  let name = taskInput.value;
  let date = dateInput.value;
  let time = timeInput.value;
  let category = document.getElementById("category").value;
  let repeatType = document.getElementById("repeatType").value;

  let repeatDays = [];
  if(repeatType === "weekly"){
    document.querySelectorAll("#daySelector input:checked").forEach(cb=>{
      repeatDays.push(Number(cb.value));
    });
  }

  if(!name || !time || (repeatType === "none" && !date)){
    alert("Fill everything");
    return;
  }

  let taskObj = {name, date, time, category, repeatType, repeatDays, notified:false};

  if(editIndex === null){
    tasks.push(taskObj);
  } else {
    tasks[editIndex] = taskObj;
    editIndex = null;
    mainBtn.innerText = "Add";
  }

  save(); render(); clearForm();
}

// EDIT
function editTask(i){
  let t = tasks[i];

  taskInput.value = t.name;
  dateInput.value = t.date || "";
  timeInput.value = t.time;
  document.getElementById("category").value = t.category;
  document.getElementById("repeatType").value = t.repeatType;

  document.getElementById("daySelector").style.display =
    t.repeatType === "weekly" ? "block" : "none";

  document.querySelectorAll("#daySelector input").forEach(cb=>{
    cb.checked = t.repeatDays.includes(Number(cb.value));
  });

  editIndex = i;
  mainBtn.innerText = "Update";
}

// REMOVE
function removeTask(i){
  tasks.splice(i,1);
  save(); render();
}

// SAVE
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// CLEAR FORM
function clearForm(){
  taskInput.value = "";
  dateInput.value = "";
  timeInput.value = "";
  document.querySelectorAll("#daySelector input").forEach(cb=>cb.checked=false);
}

// Check time difference in minutes
function minutesUntil(taskTime){
  let now = new Date();
  let [h,m] = taskTime.split(":").map(Number);
  let taskDateTime = new Date();
  taskDateTime.setHours(h, m, 0, 0);
  return (taskDateTime - now) / 60000;
}

// RENDER
function render(){
  todayTasks.innerHTML = "";
  futureTasks.innerHTML = "";
  allTasksList.innerHTML = "";

  let now = new Date();
  let today = now.toISOString().split("T")[0];
  let todayDay = now.getDay();

  tasks.forEach((t,i)=>{
    let card = document.createElement("div");
    card.className = "taskCard";
    card.innerHTML = `
      <div class="task-title">${t.name}</div>
      <div class="category">
        ${t.category} ${t.repeatType !== "none" ? "• 🔁 " + t.repeatType : ""}
      </div>
      <button class="edit" onclick="editTask(${i})">Edit</button>
      <button class="delete" onclick="removeTask(${i})">Delete</button>
    `;

    // Determine style based on due time
    let li = document.createElement("li");
    li.innerText = t.time + " - " + t.name;
    let mins = minutesUntil(t.time);
    if(mins <= 5 && mins >= 0){
      li.classList.add("flash"); // last 5 minutes
    } else if(mins <= 15 && mins >= 0){
      li.classList.add("glow");  // 15–5 minutes
    }

    // Today's tasks
    let isToday = t.repeatType === "daily" || 
                  (t.repeatType === "weekly" && t.repeatDays.includes(todayDay)) ||
                  t.date === today;
    if(isToday){
      todayTasks.appendChild(li);
    }

    // Future tasks
    if(t.repeatType === "weekly"){
      let addedDates = new Set();
      for(let offset=1; offset<=7; offset++){
        let futureDay = (todayDay + offset) % 7;
        if(t.repeatDays.includes(futureDay)){
          let futureDate = new Date();
          futureDate.setDate(futureDate.getDate() + offset);
          let dateStr = futureDate.toISOString().split("T")[0];
          if(!addedDates.has(dateStr)){
            addedDates.add(dateStr);
            let liFuture = document.createElement("li");
            liFuture.innerText = dateStr + " - " + t.time + " - " + t.name;
            let futureMins = minutesUntil(t.time);
            if(futureMins <= 5 && futureMins >= 0){
              liFuture.classList.add("flash");
            } else if(futureMins <= 15 && futureMins >= 0){
              liFuture.classList.add("glow");
            }
            futureTasks.appendChild(liFuture);
          }
        }
      }
    } else if(t.repeatType === "none" && t.date > today){
      let liFuture = document.createElement("li");
      liFuture.innerText = t.date + " - " + t.time + " - " + t.name;
      let futureMins = minutesUntil(t.time);
      if(futureMins <= 5 && futureMins >= 0){
        liFuture.classList.add("flash");
      } else if(futureMins <= 15 && futureMins >= 0){
        liFuture.classList.add("glow");
      }
      futureTasks.appendChild(liFuture);
    }

    let liAll = document.createElement("li");
    liAll.appendChild(card);
    allTasksList.appendChild(liAll);
  });
}

// UPDATE (notifications)
function update(){
  let now = new Date();
  let today = now.toISOString().split("T")[0];
  let todayDay = now.getDay();

  tasks.forEach((task, i)=>{
    let [h,m] = task.time.split(":").map(Number);

    let shouldRun = false;

    if(task.repeatType === "daily") shouldRun = true;
    else if(task.repeatType === "weekly") shouldRun = task.repeatDays.includes(todayDay);
    else shouldRun = task.date === today;

    if(shouldRun && now.getHours() === h && now.getMinutes() === m && !task.notified){
      new Notification("Reminder: " + task.name);
      task.notified = true;
      save();

      setTimeout(()=>{
        removeTask(i);
      }, 5 * 60 * 1000);
    }

    if(task.repeatType !== "none" && now.getHours() === 0 && now.getMinutes() === 0){
      task.notified = false;
      save();
    }
  });

  render(); // re-render to update glow/flash
}

setInterval(update, 60000);

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
