<!DOCTYPE html>
<html>
<head>
<title>Daily Task Reminder</title>
<style>
body {
  font-family: Arial;
  background: #f0f4f8;
  display: flex;
  gap: 40px;
  padding: 40px;
  transition: 0.3s;
}

/* DARK MODE */
.dark { background:#1f2937; color:white; }
.dark .container { background:#374151; }
.dark .taskCard { background:#4b5563; }
.dark .allTasks { background:#4338ca; }

/* PANELS */
.container {
  background:white;
  padding:25px;
  border-radius:15px;
  width:380px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.allTasks, .calendar {
  background:#ede9fe;
  padding:20px;
  border-radius:14px;
  width:250px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  height: fit-content;
}

.taskCard {
  background:#f9fafb;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.category { font-size:12px; font-weight:bold; }
.school {color:#2563eb}
.work {color:#16a34a}
.personal {color:#db2777}
.health {color:#ea580c}

.countdown { font-size:13px; color:#4f46e5; }

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
  margin-top:5px;
}

.delete { background:#ef4444; }

</style>
</head>
<body>

<!-- Task Input Panel -->
<div class="container">
  <h2>Task Reminder</h2>
  <input id="taskInput" placeholder="Task">
  <input type="date" id="dateInput">
  <input type="time" id="timeInput">
  <select id="category">
    <option>School</option>
    <option>Work</option>
    <option>Personal</option>
    <option>Health</option>
  </select>
  <button onclick="addTask()">Add</button>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
  <div id="taskList"></div>
</div>

<!-- Today / Future Panel -->
<div class="calendar">
  <h3>Today's Tasks</h3>
  <ul id="todayTasks"></ul>
  <h3>Future Tasks</h3>
  <ul id="futureTasks"></ul>
</div>

<!-- All Tasks Panel -->
<div class="allTasks">
  <h3>All Tasks</h3>
  <ul id="allTasksList"></ul>
</div>

<script>
if(Notification.permission !== "granted") {
  Notification.requestPermission();
}

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask() {
  let name = document.getElementById("taskInput").value;
  let date = document.getElementById("dateInput").value;
  let time = document.getElementById("timeInput").value;
  let category = document.getElementById("category").value;

  if(!name || !date || !time) return;

  tasks.push({name, date, time, category, notified:false});
  save();
  render();

  document.getElementById("taskInput").value = "";
  document.getElementById("dateInput").value = "";
  document.getElementById("timeInput").value = "";
}

function render() {
  let list = document.getElementById("taskList");
  let todayList = document.getElementById("todayTasks");
  let futureList = document.getElementById("futureTasks");
  let allList = document.getElementById("allTasksList");

  list.innerHTML = "";
  todayList.innerHTML = "";
  futureList.innerHTML = "";
  allList.innerHTML = "";

  let today = new Date().toISOString().split("T")[0];

  tasks.forEach((task,i)=>{
    // Main Task Card
    let card = document.createElement("div");
    card.className = "taskCard";
    card.innerHTML = `
      <b>${task.name}</b> (${task.time})
      <div class="category ${task.category.toLowerCase()}">${task.category}</div>
      <div class="countdown" id="cd${i}"></div>
      <button onclick="shareTask('${task.name}','${task.date}','${task.time}')">Share</button>
      <button class="delete" onclick="removeTask(${i})">Delete</button>
    `;
    list.appendChild(card);

    // All Tasks
    let liAll = document.createElement("li");
    liAll.innerText = `${task.name} (${task.date} ${task.time})`;
    allList.appendChild(liAll);

    // Today / Future
    let liDate = document.createElement("li");
    liDate.innerText = `${task.time} - ${task.name}`;
    if(task.date === today) todayList.appendChild(liDate);
    else futureList.appendChild(liDate);
  });
}

function removeTask(i){
  tasks.splice(i,1);
  save();
  render();
}

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function update(){
  let now = new Date();
  tasks.forEach((task,i)=>{
    let taskTime = new Date(`${task.date}T${task.time}`);
    let diff = taskTime - now;
    let cd = document.getElementById("cd"+i);

    if(cd){
      if(diff>0){
        let hours = Math.floor(diff/1000/60/60);
        let mins = Math.floor((diff/1000/60)%60);
        cd.innerText = `${hours}h ${mins}m left`;
      } else {
        cd.innerText = "Due!";
      }
    }

    // Notification once
    if(diff<=0 && !task.notified){
      new Notification(`Reminder: ${task.name}`);
      task.notified = true;
      save();
    }
  });
}
setInterval(update, 1000);

/* Dark Mode */
function toggleDark(){
  document.body.classList.toggle("dark");
}

function shareTask(name,date,time){
  const text = `Task: ${name}\nDate: ${date}\nTime: ${time}`;
  if(navigator.share){
    navigator.share({title:"Task Reminder", text:text});
  } else {
    navigator.clipboard.writeText(text);
    alert("Task copied! Send it to a friend.");
  }
}

// Initial render
render();
</script>

</body>
</html>
