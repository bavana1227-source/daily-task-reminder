<!DOCTYPE html>
<html>
<head>
<title>Daily Task Reminder</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: 'Arial', sans-serif;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

.container {
    background: #ffffff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 360px;
    text-align: center;
}

h1 { margin-bottom: 20px; color: #333; }
h2 { margin-top: 30px; color: #555; }

input, input[type="time"] {
    padding: 12px;
    width: 50%;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-right: 5px;
    font-size: 14px;
}

button {
    padding: 12px 15px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #4338ca; }

ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

li {
    background: #f9fafb;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

li.done {
    text-decoration: line-through;
    color: gray;
}

.delete-btn {
    background: #ef4444;
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
}

.delete-btn:hover { background: #b91c1c; }

.all-tasks-box {
    background: #e0e7ff;
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
    max-height: 220px;
    overflow-y: auto;
    text-align: left;
}

.countdown {
    font-weight: bold;
    color: #4f46e5;
    margin-left: 10px;
}
</style>
</head>

<body>
<div class="container">
    <h1>Daily Task Reminder</h1>

    <input id="taskInput" placeholder="Enter a task">
    <input type="time" id="timeInput" value="09:00">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

    <h2>All Tasks So Far</h2>
    <div class="all-tasks-box">
        <ul id="allTasksList"></ul>
    </div>
</div>

<script>
// PWA service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('Service Worker Registered'));
}

// Notifications
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

// Load tasks
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
render();
renderAllTasks();

function addTask() {
    let taskName = document.getElementById("taskInput").value;
    let taskTime = document.getElementById("timeInput").value;
    if(taskName === "") return;

    tasks.push({name: taskName, time: taskTime});
    saveTasks();
    render();
    renderAllTasks();
    document.getElementById("taskInput").value = "";
}

function render() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";
    tasks.forEach((task,index) => {
        let li = document.createElement("li");
        li.innerHTML = `<span>${task.name} (${task.time})</span><span class="countdown"></span>`;
        
        let del = document.createElement("button");
        del.innerText = "🗑";
        del.className = "delete-btn";
        del.onclick = function(e) {
            e.stopPropagation();
            tasks.splice(index,1);
            saveTasks();
            render();
            renderAllTasks();
        }

        li.appendChild(del);
        list.appendChild(li);
    });
}

function renderAllTasks() {
    let allList = document.getElementById("allTasksList");
    allList.innerHTML = "";
    tasks.forEach(task => {
        let li = document.createElement("li");
        li.innerText = `${task.name} (${task.time})`;
        li.style.cursor = "default";
        allList.appendChild(li);
    });
}

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

// Countdown and notifications
function updateCountdowns() {
    let now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes();

    document.querySelectorAll("#taskList li").forEach((li, i) => {
        let task = tasks[i];
        let [taskH, taskM] = task.time.split(":").map(Number);

        let diff = (taskH*60 + taskM) - (hours*60 + minutes);
        if(diff < 0) diff += 24*60; // next day
        let h = Math.floor(diff/60);
        let m = diff % 60;

        li.querySelector(".countdown").innerText = `(${h}h ${m}m left)`;

        // Notification at exact minute
        if(hours === taskH && minutes === taskM) {
            new Notification("Reminder: " + task.name);
        }
    });
}

// Update every second
setInterval(updateCountdowns, 1000);
</script>
</body>
</html>
